name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install OpenBLAS
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - name: Configure
        run: cmake --preset debug -DUSE_SYSTEM_OPENBLAS=ON

      - name: Build
        run: cmake --build --preset debug

      - name: Test
        run: ctest --preset debug

      - name: Smoke-build benchmark targets
        run: |
          cmake -B cmake-build-bench -DCMAKE_BUILD_TYPE=Release -DBUILD_BENCHMARKS=ON -DUSE_SYSTEM_OPENBLAS=ON
          cmake --build cmake-build-bench --target bench_gate bench_kraus

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install libomp
        run: brew install libomp

      - name: Configure
        run: cmake --preset debug

      - name: Build
        run: cmake --build --preset debug

      - name: Test
        run: ctest --preset debug

      - name: Smoke-build benchmark targets
        run: |
          cmake -B cmake-build-bench -DCMAKE_BUILD_TYPE=Release -DBUILD_BENCHMARKS=ON
          cmake --build cmake-build-bench --target bench_gate bench_kraus
